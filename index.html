<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* FIX: Changed 100vh to min-height and removed strict overflow to prevent cutoffs */
        html, body { min-height: 100vh; margin: 0; background-color: #0d0d0d; color: #f5f5f5; font-family: 'Inter', sans-serif; } 
        body { display: flex; flex-direction: column; overflow-x: hidden; }
        
        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .atu-font { font-family: 'JetBrains Mono', monospace; }
        .mat-border { border: 1px solid #262626; background: rgba(255,255,255,0.02); backdrop-filter: blur(2px); border-radius: 15px; }
        
        /* FIX: Title Gradient now allows wrapping to prevent cutoffs */
        .title-gradient { 
            background: linear-gradient(to right, #ffffff 20%, #ef4444 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            display: inline-block;
        }
        
        button, .command-btn, .mat-border { border-radius: 15px !important; }

        .shadow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.4); }
        .shadow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4); }
        .shadow-green { box-shadow: 0 0 20px rgba(34, 197, 10, 0.15); border: 1px solid rgba(34, 197, 94, 0.4); }

        .command-btn { 
            background: linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; justify-content: center; min-height: 110px;
        }

        .move-btn { 
            background: linear-gradient(180deg, rgba(38,38,38,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #333;
            transition: all 0.2s ease;
            border-radius: 12px !important;
        }

        /* FIX: Simplified transition logic for Red Alert */
        .screen { display: none; width: 100%; min-height: 100vh; flex-direction: column; border-top: 6px solid #404040; }
        .active-screen { display: flex; }
        .screen-red-alert { border-top-color: #ef4444 !important; }

        .style-btn, .opponent-btn, .shop-tab-btn { color: #737373; background: transparent; transition: all 0.2s ease; border: 1px solid #262626; }
        .active-style, .active-shop-tab { background: #ef4444 !important; border-color: #ef4444 !important; color: white !important; font-weight: 900; }
        .active-ai { background: #ef4444 !important; border-color: #ef4444 !important; color: white !important; font-weight: 900; }
        .active-live { background: #3b82f6 !important; border-color: #3b82f6 !important; color: white !important; font-weight: 900; }

        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
        .progress-fill { height: 100%; width: 0%; transition: width 3s linear; }
        .training-active .progress-container { display: block; }
        
        #energy-bar-container { width: 200px; height: 10px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        #energy-fill { height: 100%; width: 100%; background: #ef4444; transition: all 0.5s ease; }
    </style>
</head>
<body>

    <div id="main-dashboard" class="screen active-screen">
        <header class="flex-none p-4 md:p-6 border-b border-neutral-900 flex justify-between items-start bg-black px-4">
            <div class="flex flex-col justify-center flex-grow">
                <h1 class="text-xl md:text-2xl font-black tracking-tighter text-white heavyweight-font italic leading-tight">
                    MAT LOGIC <span class="text-red-600">STUDIOS</span>
                </h1>
                <h2 class="text-3xl md:text-5xl lg:text-6xl heavyweight-font tracking-tighter title-gradient leading-none">
                    WRESTLING INTERACTIVE SIM
                </h2>
                <div class="mt-4 flex items-center gap-3">
                    <div id="energy-bar-container">
                        <div id="energy-fill"></div>
                    </div>
                </div>
            </div>
            <div class="flex-none ml-4">
                <img src="logo.png" alt="Mat Logic Studios" class="h-16 md:h-24 w-auto object-contain">
            </div>
        </header>

        <main class="flex-grow p-4 md:p-6 max-w-7xl mx-auto w-full">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-blue-600 shadow-blue">
                    <div class="text-[10px] text-blue-500 uppercase font-black tracking-widest">Stable Strength</div>
                    <div id="stable-count" class="text-3xl md:text-4xl heavyweight-font mt-1">3 / 12</div>
                </div>
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-red-600 shadow-red">
                    <div class="text-[10px] text-red-500 uppercase font-black tracking-widest">Season Record</div>
                    <div class="text-3xl md:text-4xl heavyweight-font mt-1 text-red-600 italic">0 - 0</div>
                </div>
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-green-600 shadow-green">
                    <div class="text-[10px] text-green-500 uppercase font-black tracking-widest">Total Credits</div>
                    <div id="total-credits" class="text-3xl md:text-4xl heavyweight-font mt-1 text-green-500">$1000.00</div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="showScreen('recruit-screen')" class="command-btn p-4 md:p-6 text-left group border-b-4 border-b-neutral-800">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic group-hover:text-white">RECRUIT</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest">Cost: $100.00</p>
                </button>
                <button onclick="showScreen('wrestling-room-screen')" class="command-btn p-4 md:p-6 text-left group border-b-4 border-b-red-600">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic text-red-600">WRESTLING ROOM</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest">Train & Level Up</p>
                </button>
                <button onclick="showScreen('the-mat-screen')" class="command-btn p-4 md:p-6 text-left group border-b-4 border-b-red-900">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic text-red-600">THE MAT</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest">Simulations & Live</p>
                </button>
                <button onclick="showScreen('shop-screen')" class="command-btn p-4 md:p-6 text-left group border-b-4 border-b-green-900 shadow-green">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic text-green-600">THE SHOP</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest">Gear & Credits</p>
                </button>
            </div>
        </main>
    </div>

    <div id="recruit-screen" class="screen bg-[#050505]">
        <header class="flex-none p-4 md:p-8 border-b border-neutral-900 flex justify-between items-center bg-black px-4">
            <h2 class="text-4xl md:text-6xl heavyweight-font title-gradient italic">RECRUIT</h2>
            <button onclick="showScreen('main-dashboard')" class="heavyweight-font bg-red-600 text-white px-6 py-2 rounded-full text-xs">RETURN</button>
        </header>
        <main class="flex-grow p-4 md:p-8 overflow-y-auto">
            <div class="mat-border p-6 md:p-8 bg-black/40 mb-8 max-w-4xl mx-auto">
                <h3 class="text-xl heavyweight-font italic mb-6">NEW PROSPECT SIGNING</h3>
                <div class="space-y-6">
                    <input type="text" id="recruit-name-input" class="w-full bg-neutral-900 border border-neutral-800 p-4 heavyweight-font text-2xl italic text-white" placeholder="ENTER NAME...">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <button onclick="selectRecruitStyle('Folkstyle', this)" class="recruit-style-btn py-3 border border-neutral-800 font-black text-[10px] uppercase">Folkstyle</button>
                        <button onclick="selectRecruitStyle('Freestyle', this)" class="recruit-style-btn py-3 border border-neutral-800 font-black text-[10px] uppercase">Freestyle</button>
                        <button onclick="selectRecruitStyle('Greco-Roman', this)" class="recruit-style-btn py-3 border border-neutral-800 font-black text-[10px] uppercase">Greco-Roman</button>
                    </div>
                    <button onclick="confirmRecruit()" class="w-full bg-red-600 py-4 heavyweight-font italic text-xl">FINALIZE RECRUITMENT</button>
                </div>
            </div>
        </main>
    </div>

    <div id="shop-screen" class="screen bg-[#050505]">
        <header class="flex-none p-4 md:p-8 border-b border-neutral-900 flex justify-between items-center bg-black px-4">
            <h2 class="text-4xl md:text-6xl heavyweight-font title-gradient italic">THE SHOP</h2>
            <button onclick="showScreen('main-dashboard')" class="heavyweight-font bg-red-600 text-white px-6 py-2 rounded-full text-xs">RETURN</button>
        </header>
        <main class="flex-grow p-4 md:p-8 overflow-y-auto">
            <div id="shop-supplements" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-6xl mx-auto">
                <div class="mat-border p-6 bg-black/40 relative">
                    <h3 class="text-2xl heavyweight-font italic text-green-500">Monthly Vitality Pack</h3>
                    <p class="text-neutral-500 text-[10px] font-black uppercase mb-4">Refills Energy Bar to 100%</p>
                    <button onclick="buySupplement()" class="w-full bg-green-900/40 border border-green-600 p-3 text-white font-black text-xs uppercase">Buy - $250.00</button>
                </div>
            </div>
        </main>
    </div>

    <div id="wrestling-room-screen" class="screen bg-[#050505]">
        <header class="flex-none p-4 md:p-8 border-b border-neutral-900 flex justify-between items-center bg-black px-4">
            <h2 class="text-4xl md:text-6xl heavyweight-font title-gradient italic">WRESTLING ROOM</h2>
            <button onclick="showScreen('main-dashboard')" class="heavyweight-font bg-red-600 text-white px-6 py-2 rounded-full text-xs">RETURN</button>
        </header>
        <main class="flex-grow p-4 md:p-8 overflow-y-auto">
            <div id="stable-roster" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                </div>
        </main>
    </div>

    <div id="the-mat-screen" class="screen bg-[#050505]">
        <header class="flex-none p-4 md:p-8 border-b border-neutral-900 flex justify-between items-center bg-black px-4">
            <h2 class="text-4xl md:text-6xl heavyweight-font title-gradient italic">THE MAT</h2>
            <button onclick="showScreen('main-dashboard')" class="heavyweight-font bg-red-600 text-white px-6 py-2 rounded-full text-xs">EXIT</button>
        </header>
        <main class="flex-grow p-4 overflow-y-auto">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <div class="md:col-span-3 mat-border p-6 text-center">
                    <div class="text-[10px] text-red-500 font-black uppercase mb-1">Action Clock</div>
                    <div id="action-timer" class="text-6xl heavyweight-font text-white">15</div>
                </div>
                <div class="md:col-span-6 mat-border min-h-[300px] flex items-center justify-center">
                    <p class="heavyweight-font opacity-20 text-2xl">VISUAL BAY</p>
                </div>
                <div class="md:col-span-3 mat-border p-6 flex flex-col gap-4">
                    <button id="btn-ai" onclick="setOpponent('ai')" class="opponent-btn w-full py-3 rounded-xl font-black text-[10px]">AI SIMULATION</button>
                    <button id="btn-live" onclick="setOpponent('live')" class="opponent-btn w-full py-3 rounded-xl font-black text-[10px]">LIVE CHALLENGE</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let energy = 200;
        let credits = 1000;
        let stableSize = 3;
        let timerInterval;

        function showScreen(id) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => {
                s.classList.remove('active-screen', 'screen-red-alert');
            });

            const active = document.getElementById(id);
            active.classList.add('active-screen');

            // FIX: Force browser to recalculate layout (reflow) to ensure red border shows
            void active.offsetWidth; 

            if (id !== 'main-dashboard') {
                active.classList.add('screen-red-alert');
            }

            if (id === 'the-mat-screen') startActionTimer();
            else clearInterval(timerInterval);
        }

        function startActionTimer() {
            clearInterval(timerInterval);
            let actionTime = 15;
            document.getElementById('action-timer').innerText = actionTime;
            timerInterval = setInterval(() => {
                actionTime--;
                document.getElementById('action-timer').innerText = actionTime;
                if (actionTime <= 0) actionTime = 15;
            }, 1000);
        }

        function updateEnergyUI() {
            const fill = document.getElementById('energy-fill');
            if (fill) fill.style.width = `${(energy / 200) * 100}%`;
        }

        // Initialize
        updateEnergyUI();
    </script>
</body>
</html>
