<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: sans-serif; }
        .command-panel { border: 2px solid #262626; background: #171717; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full command-panel p-8 rounded-lg shadow-2xl text-center">
        <h1 class="text-2xl font-black tracking-tighter text-white mb-2">WRESTLING INTERACTIVE SIM</h1>
        <p class="text-xs tracking-widest text-gray-500 mb-8">MAT LOGIC STUDIOS // COMMAND CENTER</p>
        
        <div class="grid gap-4">
            <button class="bg-white text-black font-bold py-4 rounded hover:bg-gray-200 transition">
                RECRUIT NEW WRESTLER
            </button>
            <button class="border-2 border-white text-white font-bold py-4 rounded hover:bg-white hover:text-black transition">
                ENTER THE MAT
            </button>
            <div class="mt-4 p-4 bg-black/50 rounded border border-white/10">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Stable Status</p>
                <p class="text-xl font-mono text-green-500">ACTIVE</p>
            </div>
        </div>
        
        <p class="mt-8 text-[10px] text-gray-600">© 2026 MAT LOGIC STUDIOS. THE MAT IS YOURS. TAKE CONTROL.</p>
    </div>
</body>
</html>
