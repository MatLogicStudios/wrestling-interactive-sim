<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100vh; margin: 0; overflow: hidden; } 
        body { background-color: #0d0d0d; color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }
        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .mat-border { border: 1px solid #262626; background: rgba(255,255,255,0.02); backdrop-filter: blur(2px); border-radius: 15px; }
        .title-gradient { background: linear-gradient(to right, #ffffff 20%, #ef4444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        button, .command-btn, .mat-border { border-radius: 15px !important; }

        .command-btn { 
            background: linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; justify-content: center;
            height: 110px;
        }
        .command-btn:hover { border-color: #ef4444; transform: translateY(-2px); }
        
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active-screen { display: flex; }

        .footer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body class="border-t-4 border-red-600">

    <!-- MAIN DASHBOARD -->
    <div id="main-dashboard" class="screen active-screen">
        <header class="flex-none p-4 md:p-6 border-b border-neutral-900 flex justify-between items-center bg-black relative">
            <div class="flex flex-col justify-center">
                <h1 class="text-xl md:text-2xl font-black tracking-tighter text-white heavyweight-font italic leading-tight">
                    MAT LOGIC <span class="text-red-600">STUDIOS</span>
                </h1>
                <h2 class="text-3xl md:text-5xl lg:text-6xl heavyweight-font tracking-tighter title-gradient leading-none">
                    WRESTLING INTERACTIVE SIM
                </h2>
            </div>
            <div class="flex items-center">
                <!-- FUNCTIONAL MAT LOBBY BUTTON -->
                <button onclick="showScreen('main-dashboard')" class="heavyweight-font bg-red-700 hover:bg-red-600 text-white px-8 py-4 rounded-full text-xs tracking-[0.2em] transition border border-red-500 shadow-lg mr-4 md:mr-10">
                    MAT LOBBY
                </button>
                <div class="flex-none" style="min-width: 150px;"> 
                    <img src="logo.png" alt="Mat Logic Studios" class="h-24 md:h-32 w-auto object-contain">
                </div>
            </div>
        </header>

        <main class="flex-grow flex flex-col justify-center p-4 md:p-6 max-w-7xl mx-auto w-full">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <!-- UPDATED STABLE STRENGTH -->
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-neutral-600">
                    <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Stable Strength</div>
                    <div class="text-3xl md:text-4xl heavyweight-font mt-1">3 / 12</div>
                </div>
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-red-600">
                    <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Season Record</div>
                    <div class="text-3xl md:text-4xl heavyweight-font mt-1 text-red-600 italic">0 - 0</div>
                </div>
                <!-- UPDATED CREDITS -->
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-green-600">
                    <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Total Credits</div>
                    <div class="text-3xl md:text-4xl heavyweight-font mt-1 text-green-500">$500.00</div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button class="command-btn p-6 text-left group border-b-4 border-b-neutral-800">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic group-hover:text-white">RECRUIT</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Find Prospects</p>
                </button>
                <button onclick="showScreen('wrestling-room-screen')" class="command-btn p-6 text-left group border-b-4 border-b-red-600">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic text-red-600 group-hover:text-red-500">WRESTLING ROOM</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Train & Level Up</p>
                </button>
                <button class="command-btn p-6 text-left group border-b-4 border-b-red-900">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic text-red-600 group-hover:text-red-500">THE MAT</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Simulations</p>
                </button>
                <button class="command-btn p-6 text-left group border-b-4 border-b-green-900">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic text-green-600 group-hover:text-green-500">THE SHOP</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Gear & Credits</p>
                </button>
            </div>
        </main>

        <footer class="flex-none p-6 border-t border-neutral-900 bg-black footer-container">
            <div class="text-xs font-black tracking-widest text-white heavyweight-font italic mb-1">
                MAT LOGIC STUDIOS // V 1.0.4
            </div>
            <div class="text-[10px] text-red-600 heavyweight-font italic tracking-[0.2em] uppercase">
                AUTHENTICITY VERIFIED // TACTICAL ADVANTAGE ACTIVE
            </div>
            <div class="text-[10px] text-neutral-500 heavyweight-font tracking-[0.1em] uppercase mt-1">
                © 2026 ALL RIGHTS RESERVED
            </div>
        </footer>
    </div>

    <!-- WRESTLING ROOM SCREEN -->
    <div id="wrestling-room-screen" class="screen bg-[#050505]">
        <header class="flex-none p-6 border-b border-neutral-900 flex justify-between items-center bg-black">
            <h2 class="text-4xl heavyweight-font title-gradient italic">WRESTLING ROOM</h2>
            <button onclick="showScreen('main-dashboard')" class="heavyweight-font bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-full text-xs tracking-widest border border-red-500">BACK TO DASHBOARD</button>
        </header>
        <main class="flex-grow p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="mat-border p-6 border-t-4 border-t-red-600">
                    <h3 class="text-2xl heavyweight-font italic text-white">Caelun Sanders</h3>
                    <p class="text-red-500 text-[10px] font-black tracking-[0.2em] uppercase mb-4">The Unbeaten One</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }
    </script>
</body>
</html>
