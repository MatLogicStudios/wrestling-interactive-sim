<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background-color: #0d0d0d; } 
        body { color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: -0.01em; }
        .mat-border { border: 1px solid #262626; background: rgba(255,255,255,0.02); backdrop-filter: blur(2px); }
        
        .title-gradient {
            background: linear-gradient(to right, #ffffff 20%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* FLOATING LOGO: Keeps it large without pushing content down */
        .floating-logo {
            position: absolute;
            top: 15px;
            right: 15px;
            height: 90px; /* Large and visible */
            border: 1px solid #333;
            background: #000;
            padding: 4px;
            box-shadow: 0 0 20px rgba(239,68,68,0.3);
            z-index: 50;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(185, 28, 28, 0); }
            100% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0); }
        }
        .lobby-pulse { animation: pulse-red 2s infinite; }

        .command-btn { 
            background: linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #444;
            flex: 1; /* Makes buttons share the remaining height */
        }
    </style>
</head>
<body class="border-t-4 border-red-600">

    <div class="floating-logo rounded-sm">
        <img src="logo.png" alt="Mat Logic Shield" class="h-full w-auto">
    </div>

    <header class="p-4 border-b border-neutral-900 flex justify-between items-center bg-black relative z-10">
        <div class="flex flex-col">
            <h1 class="text-base font-black tracking-widest text-red-600 heavyweight-font italic leading-none mb-1">
                MAT LOGIC SYSTEMS
            </h1>
            <h2 class="text-3xl md:text-5xl heavyweight-font tracking-tighter title-gradient leading-none">
                WRESTLING INTERACTIVE SIM
            </h2>
        </div>
        
        <div class="mr-32"> 
            <button onclick="toggleLobby()" class="heavyweight-font bg-red-700 text-white px-6 py-3 rounded-full text-xs tracking-widest transition lobby-pulse border border-red-500">
                MAT LOBBY
            </button>
        </div>
    </header>

    <main class="flex-grow flex flex-col p-4 max-w-7xl mx-auto w-full gap-4 overflow-hidden">
        
        <div class="grid grid-cols-3 gap-4">
            <div class="mat-border p-4 rounded-sm border-l-4 border-l-neutral-700">
                <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Stable Strength</div>
                <div class="text-4xl heavyweight-font text-white leading-none mt-1">0 / 12</div>
            </div>
            <div class="mat-border p-4 rounded-sm border-l-4 border-l-red-600">
                <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Season Record</div>
                <div class="text-4xl heavyweight-font text-red-600 italic leading-none mt-1">0 - 0</div>
            </div>
            <div class="mat-border p-4 rounded-sm border-l-4 border-l-green-600">
                <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Total Credits</div>
                <div class="text-4xl heavyweight-font text-green-500 leading-none mt-1">$500.00</div>
            </div>
        </div>

        <div class="flex flex-grow gap-4 min-h-0">
            <button class="command-btn p-8 rounded-sm text-left group border-b-4 border-b-neutral-800 flex flex-col justify-center">
                <h3 class="text-4xl heavyweight-font mb-2 italic group-hover:text-red-500 transition-colors">RECRUIT</h3>
                <p class="text-neutral-300 text-sm font-bold uppercase tracking-wide leading-tight">
                    Acquire elite prospects for your roster.
                </p>
            </button>

            <button class="command-btn p-8 rounded-sm text-left group border-b-4 border-b-red-900 flex flex-col justify-center">
                <h3 class="text-4xl heavyweight-font mb-2 italic text-red-600 group-hover:text-red-500 transition-colors">THE MAT</h3>
                <p class="text-neutral-300 text-sm font-bold uppercase tracking-wide leading-tight">
                    Initiate high-stakes simulations.
                </p>
            </button>
        </div>
    </main>

    <footer class="p-2 border-t border-neutral-900 text-center bg-black">
        <p class="text-[9px] text-neutral-500 uppercase tracking-[0.4em] font-black">
            © 2026 MAT LOGIC STUDIOS // SYSTEM v2.1
        </p>
    </footer>

</body>
</html>
