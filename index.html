<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-blue: #007bff;
            --accent-red: #dc3545;
            --accent-green: #28a745;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 25px 20px;
            text-align: center;
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
            border-bottom: 2px solid #333;
            flex-shrink: 0;
        }

        .logo-placeholder {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.8rem;
            letter-spacing: 3px;
            color: var(--accent-blue);
        }

        .view {
            display: none;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .view.active {
            display: block;
        }

        h2 {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.2rem;
            margin-bottom: 25px;
            border-left: 5px solid var(--accent-blue);
            padding-left: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .card-blue { border-top: 4px solid var(--accent-blue); }
        .card-red { border-top: 4px solid var(--accent-red); }
        .card-green { border-top: 4px solid var(--accent-green); }

        .athlete-name { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; margin: 0; }
        .athlete-stats { color: var(--text-dim); font-size: 0.9rem; margin: 10px 0; }

        .progress-container {
            background: #252525;
            height: 14px;
            border-radius: 7px;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid #444;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-blue);
            transition: width 0.1s linear;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            background: #333;
            color: white;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: space-around;
            border-top: 2px solid #333;
            padding: 15px 0;
            z-index: 1000;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: 'Bebas Neue', cursive;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .nav-item.active { color: var(--accent-blue); border-bottom: 2px solid var(--accent-blue); }
    </style>
</head>
<body>

<header>
    <div class="logo-placeholder">MAT LOGIC STUDIOS</div>
</header>

<!-- Main Wrestling Room View -->
<div id="roomView" class="view active">
    <h2>WRESTLING ROOM</h2>
    <div class="grid">
        <div class="card card-blue">
            <p class="athlete-name">Caelun Sanders</p>
            <p class="athlete-stats">Technique: 84 | Power: 72</p>
            <div class="progress-container"><div id="bar1" class="progress-bar"></div></div>
            <button class="btn" onclick="startTraining('bar1')">Drilling Session</button>
        </div>
        <div class="card card-red">
            <p class="athlete-name">Jace Burrell</p>
            <p class="athlete-stats">Technique: 91 | Power: 65</p>
            <div class="progress-container"><div id="bar2" class="progress-bar"></div></div>
            <button class="btn" onclick="startTraining('bar2')">Move Refinement</button>
        </div>
        <div class="card card-green">
            <p class="athlete-name">Aleksei Karelli</p>
            <p class="athlete-stats">Technique: 70 | Power: 95</p>
            <div class="progress-container"><div id="bar3" class="progress-bar"></div></div>
            <button class="btn" onclick="startTraining('bar3')">Power Lifting</button>
        </div>
    </div>
</div>

<!-- Recruitment View -->
<div id="recruitView" class="view">
    <h2>RECRUITMENT CENTER</h2>
    <div class="grid">
        <div class="card card-blue">
            <p class="athlete-name">Scout New Talent</p>
            <p class="athlete-stats">Availability: High</p>
            <button class="btn" onclick="alert('Searching for prospects...')">Begin Scouting</button>
        </div>
    </div>
</div>

<!-- The Mat Lobby View -->
<div id="matView" class="view">
    <h2>THE MAT LOBBY</h2>
    <div class="grid">
        <div class="card card-red">
            <p class="athlete-name">Match Maker</p>
            <p class="athlete-stats">Status: Open</p>
            <button class="btn" onclick="alert('Match Engine Initializing...')">Schedule Match</button>
        </div>
    </div>
</div>

<nav>
    <button id="navRecruit" class="nav-item" onclick="showView('recruitView', 'navRecruit')">RECRUIT</button>
    <button id="navRoom" class="nav-item active" onclick="showView('roomView', 'navRoom')">ROOM</button>
    <button id="navMat" class="nav-item" onclick="showView('matView', 'navMat')">THE MAT</button>
</nav>

<script>
    function startTraining(barId) {
        const bar = document.getElementById(barId);
        const btn = bar.closest('.card').querySelector('.btn');
        btn.disabled = true;
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                btn.disabled = false;
                bar.style.width = '0%';
            } else {
                width++;
                bar.style.width = width + '%';
            }
        }, 30);
    }

    function showView(viewId, navId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        document.getElementById(navId).classList.add('active');
    }
</script>

</body>
</html>
