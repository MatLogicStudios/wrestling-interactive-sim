<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .mat-border { border: 2px solid #262626; }
        .command-btn { 
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid #333;
            transition: all 0.2s ease;
        }
        .command-btn:hover { border-color: #ef4444; color: #fff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        #war-room { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .challenge-btn { font-size: 10px; border: 1px solid #991b1b; padding: 4px 8px; border-radius: 4px; color: #ef4444; font-weight: bold; }
        .challenge-btn:hover { background: #991b1b; color: white; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .busy { background: #ef4444; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-6 border-b border-neutral-800 flex justify-between items-center bg-black relative z-10">
        <h1 class="text-xl font-bold tracking-tighter text-white">MAT LOGIC <span class="text-red-600">SYSTEMS</span></h1>
        <button onclick="toggleWarRoom()" class="px-4 py-2 bg-neutral-900 border border-neutral-700 rounded text-xs uppercase tracking-widest hover:bg-neutral-800">
            Tactical Lobby
        </button>
    </header>

    <main class="flex-grow p-4 md:p-10 max-w-6xl mx-auto w-full">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center md:text-left">
            <div class="mat-border p-4 bg-neutral-900/50 rounded-lg">
                <div class="text-xs text-neutral-500 uppercase tracking-tighter">Stable Strength</div>
                <div class="text-2xl font-mono mt-1">0 / 12</div>
            </div>
            <div class="mat-border p-4 bg-neutral-900/50 rounded-lg">
                <div class="text-xs text-neutral-500 uppercase tracking-tighter">Season Record</div>
                <div class="text-2xl font-mono mt-1 text-red-500">0 - 0</div>
            </div>
            <div class="mat-border p-4 bg-neutral-900/50 rounded-lg">
                <div class="text-xs text-neutral-500 uppercase tracking-tighter">Credits</div>
                <div class="text-2xl font-mono mt-1 text-green-500">$500.00</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <button class="command-btn p-10 rounded-xl text-left border-neutral-800">
                <h2 class="text-2xl font-bold mb-2 uppercase italic tracking-tight">Recruit</h2>
                <p class="text-neutral-500 text-sm">Scan the circuit for technical prospects.</p>
            </button>
            <button class="command-btn p-10 rounded-xl text-left border-red-900/30">
                <h2 class="text-2xl font-bold mb-2 uppercase italic tracking-tight text-red-600">The Mat</h2>
                <p class="text-neutral-500 text-sm">Launch active match simulation.</p>
            </button>
        </div>
    </main>

    <aside id="war-room" class="fixed top-0 right-0 h-full w-80 bg-neutral-950 border-l border-neutral-800 z-50 transform translate-x-full shadow-2xl flex flex-col">
        <div class="p-4 border-b border-neutral-800 flex justify-between items-center bg-black">
            <span class="text-xs font-bold uppercase tracking-widest text-red-600">Matchmaking Lobby</span>
            <button onclick="toggleWarRoom()" class="text-neutral-500 hover:text-white">&times;</button>
        </div>
        
        <div class="p-4 bg-neutral-900/30 border-b border-neutral-800">
            <div class="flex justify-between items-center">
                <span class="text-xs uppercase text-neutral-400">Your Status:</span>
                <select id="statusSelect" onchange="updateStatus()" class="bg-black border border-neutral-700 text-xs rounded px-2 py-1 outline-none">
                    <option value="online">Available</option>
                    <option value="busy">Invisible / Busy</option>
                </select>
            </div>
        </div>

        <div class="p-4 text-xs font-bold text-neutral-600 uppercase border-b border-neutral-900">Active Managers</div>
        
        <div id="lobby-list" class="flex-grow p-2 overflow-y-auto space-y-2">
            <div class="bg-neutral-900/50 p-3 rounded border border-neutral-800 flex justify-between items-center">
                <div>
                    <div class="text-sm font-bold text-neutral-200"><span class="status-dot online"></span>Manager_Alpha</div>
                    <div class="text-[10px] text-neutral-500">Record: 14-2</div>
                </div>
                <button class="challenge-btn">INVITE</button>
            </div>
        </div>
    </aside>

    <script>
        function toggleWarRoom() {
            const warRoom = document.getElementById('war-room');
            warRoom.classList.toggle('translate-x-full');
        }

        function updateStatus() {
            const status = document.getElementById('statusSelect').value;
            // This is where we'll eventually send the "status" to the server
            alert("Your status is now: " + status);
        }
    </script>
</body>
</html>
