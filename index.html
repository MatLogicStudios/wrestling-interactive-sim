<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; } 
        
        body { 
            background-color: #0d0d0d; 
            color: #f5f5f5; 
            font-family: 'Inter', sans-serif; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: -0.01em; }
        .mat-border { border: 1px solid #262626; background: rgba(255,255,255,0.02); backdrop-filter: blur(2px); }
        
        .title-gradient {
            background: linear-gradient(to right, #ffffff 20%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(185, 28, 28, 0); }
            100% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0); }
        }
        .lobby-pulse { animation: pulse-red 2s infinite; }

        .command-btn { 
            background: linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .command-btn:hover { border-color: #ef4444; transform: translateY(-2px); }
        
        #lobby-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.98); 
            z-index: 100;
        }

        /* BLENDING TRICK: Hides black background without needing a transparent PNG */
        .logo-blend {
            mix-blend-mode: screen;
        }
    </style>
</head>
<body class="border-t-4 border-red-600 relative">

    <img src="logo.png" alt="Mat Logic Seal" 
         class="logo-blend absolute top-4 right-4 md:top-12 md:right-12 h-32 md:h-72 w-auto object-contain opacity-80 z-0 pointer-events-none drop-shadow-[0_0_25px_rgba(239,68,68,0.4)]">

    <header class="p-4 md:p-12 border-b border-neutral-900 flex justify-between items-center bg-black/90 relative z-10">
        <div class="flex flex-col justify-center">
            <h1 class="text-3xl md:text-5xl font-black tracking-tighter text-white heavyweight-font italic leading-none mb-1">
                MAT LOGIC <span class="text-red-600">SYSTEMS</span>
            </h1>
            <h2 class="text-3xl md:text-7xl heavyweight-font tracking-tighter title-gradient leading-none">
                WRESTLING INTERACTIVE SIM
            </h2>
        </div>
        
        <div class="flex items-center gap-12 relative z-20">
            <button onclick="toggleLobby()" class="heavyweight-font bg-red-700 hover:bg-red-600 text-white px-10 py-5 rounded-full text-sm tracking-[0.2em] transition lobby-pulse border border-red-500 shadow-lg shadow-red-900/20">
                MAT LOBBY
            </button>
        </div>
    </header>

    <main class="flex-grow flex flex-col justify-center p-4 md:p-8 max-w-7xl mx-auto w-full relative z-10">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 relative">
            <div class="mat-border p-6 rounded-sm border-l-4 border-l-neutral-600">
                <div class="text-xs text-neutral-400 uppercase font-black tracking-widest">Stable Strength</div>
                <div class="text-4xl heavyweight-font mt-1">0 / 12</div>
            </div>
            <div class="mat-border p-6 rounded-sm border-l-4 border-l-red-600">
                <div class="text-xs text-neutral-400 uppercase font-black tracking-widest">Season Record</div>
                <div class="text-4xl heavyweight-font mt-1 text-red-600 italic">0 - 0</div>
            </div>
            <div class="mat-border p-6 rounded-sm border-l-4 border-l-green-600">
                <div class="text-xs text-neutral-400 uppercase font-black tracking-widest">Total Credits</div>
                <div class="text-4xl heavyweight-font mt-1 text-green-500">$500.00</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 min-h-[200px]">
            <button class="command-btn p-8 rounded-sm text-left group border-b-4 border-b-neutral-800">
                <h3 class="text-4xl heavyweight-font mb-2 italic group-hover:text-white">RECRUIT</h3>
                <p class="text-neutral-400 text-xs md:text-sm font-bold uppercase tracking-widest leading-snug">
                    Scan the technical circuit to acquire elite prospects for your roster.
                </p>
            </button>

            <button class="command-btn p-8 rounded-sm text-left group border-b-4 border-b-red-900">
                <h3 class="text-4xl heavyweight-font mb-2 italic text-red-600 group-hover:text-red-500">THE MAT</h3>
                <p class="text-neutral-400 text-xs md:text-sm font-bold uppercase tracking-widest leading-snug">
                    Initiate high-stakes match simulations and test your stable's logic.
                </p>
            </button>
        </div>
    </main>

    <footer class="p-6 border-t border-neutral-900 text-center bg-black relative z-10">
        <p class="text-[10px] text-neutral-500 uppercase tracking-[0.4em] font-black mb-1">
            © 2026 MAT LOGIC STUDIOS // SYSTEM v2.1
        </p>
        <p class="text-[10px] text-red-600 uppercase tracking-widest font-bold italic">
            Authenticity: The Ultimate Tactical Advantage.
        </p>
    </footer>

    <script>
        function toggleLobby() {
            const overlay = document.getElementById('lobby-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }
    </script>

</body>
</html>
