<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100vh; margin: 0; overflow: hidden; } 
        body { background-color: #0d0d0d; color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }
        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .mat-border { border: 1px solid #262626; background: rgba(255,255,255,0.02); backdrop-filter: blur(2px); border-radius: 15px; }
        .title-gradient { background: linear-gradient(to right, #ffffff 20%, #ef4444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        button, .command-btn, .mat-border { border-radius: 15px !important; }

        .command-btn { 
            background: linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; justify-content: center; height: 100%;
        }
        .command-btn:hover { border-color: #ef4444; transform: translateY(-2px); }
        
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }

        .danger-btn-large {
            background-color: #dc2626 !important;
            color: white !important;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: 0.2s;
            border-radius: 15px !important;
        }
        .danger-btn-large:hover { background-color: #ef4444 !important; transform: scale(1.05); }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active-screen { display: flex; }

        .clock-pulse { animation: pulse 1s infinite; color: #ff0000; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="border-t-4 border-red-600">

    <!-- MAIN DASHBOARD -->
    <div id="main-dashboard" class="screen active-screen">
        <header class="flex-none p-4 md:p-6 border-b border-neutral-900 flex justify-between items-center bg-black relative">
            <div class="flex flex-col justify-center">
                <h1 class="text-xl md:text-2xl font-black tracking-tighter text-white heavyweight-font italic leading-tight">
                    MAT LOGIC <span class="text-red-600">STUDIOS</span>
                </h1>
                <h2 class="text-3xl md:text-5xl lg:text-6xl heavyweight-font tracking-tighter title-gradient leading-none">
                    WRESTLING INTERACTIVE SIM
                </h2>
            </div>
            <div class="flex items-center">
                <button onclick="showScreen('mat-lobby-screen')" class="heavyweight-font bg-red-700 hover:bg-red-600 text-white px-8 py-4 rounded-full text-xs tracking-[0.2em] transition border border-red-500 shadow-lg mr-4 md:mr-10">
                    MAT LOBBY
                </button>
                <div class="flex-none" style="min-width: 150px;"> 
                    <!-- UPDATED LOGO PATH: Points to MatLogicStudios repo -->
                    <img src="https://raw.githubusercontent.com/MatLogicStudios/wrestling-interactive-sim/main/logo.png" 
                         alt="Mat Logic Studios" 
                         class="h-24 md:h-40 w-auto object-contain">
                </div>
            </div>
        </header>

        <main class="flex-grow flex flex-col justify-center p-4 md:p-6 max-w-7xl mx-auto w-full overflow-hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-neutral-600">
                    <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Stable Strength</div>
                    <div id="stable-count" class="text-3xl md:text-4xl heavyweight-font mt-1">3 / 12</div>
                </div>
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-red-600">
                    <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Season Record</div>
                    <div class="text-3xl md:text-4xl heavyweight-font mt-1 text-red-600 italic">0 - 0</div>
                </div>
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-green-600">
                    <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Total Credits</div>
                    <div id="credit-display" class="text-3xl md:text-4xl heavyweight-font mt-1 text-green-500">$500.00</div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 flex-grow max-h-[40vh]">
                <button onclick="toggleOverlay('recruit-modal')" class="command-btn p-4 md:p-6 text-left group border-b-4 border-b-neutral-800">
                    <h3 class="text-xl md:text-2xl heavyweight-font mb-1 italic group-hover:text-white">RECRUIT</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Find Prospects</p>
                </button>
                <button onclick="showScreen('wrestling-room-screen')" class="command-btn p-4 md:p-6 text-left group border-b-4 border-b-red-600">
                    <h3 class="text-xl md:text-2xl heavyweight-font mb-1 italic text-red-600 group-hover:text-red-500">WRESTLING ROOM</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Train & Level Up</p>
                </button>
                <button onclick="startSim()" class="command-btn p-4 md:p-6 text-left group border-b-4 border-b-red-900">
                    <h3 class="text-xl md:text-2xl heavyweight-font mb-1 italic text-red-600 group-hover:text-red-500">THE MAT</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Simulations</p>
                </button>
                <button class="command-btn p-4 md:p-6 text-left group border-b-4 border-b-green-900">
                    <h3 class="text-xl md:text-2xl heavyweight-font mb-1 italic text-green-600 group-hover:text-green-500">THE SHOP</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Gear & Credits</p>
                </button>
            </div>
        </main>
    </div>

    <!-- [Remainder of scripts and modals preserved] -->

    <script>
        let credits = 500;
        let stableCount = 3;
        
        let wrestlers = [
            { name: "Caelun Sanders", tagline: "The Unbeaten One", status: "Ready" },
            { name: "Jace Burrow", tagline: "The Power Takedown Machine", status: "Ready" },
            { name: "Alexei Karelan", tagline: "The Phenom", status: "Ready" }
        ];

        function buyProspect() {
            if (credits >= 150) {
                credits -= 150;
                stableCount++;
                document.getElementById('credit-display').innerText = `$${credits.toFixed(2)}`;
                document.getElementById('stable-count').innerText = `${stableCount} / 12`;
                alert("New prospect recruited!");
                toggleOverlay('recruit-modal');
            } else {
                alert("Insufficient credits!");
            }
        }

        function renderRoster() {
            const container = document.getElementById('roster-container');
            container.innerHTML = '';
            wrestlers.forEach(w => {
                container.innerHTML += `
                    <div class="mat-border p-4 bg-neutral-900/50">
                        <div class="text-red-600 heavyweight-font text-lg italic leading-tight">${w.name}</div>
                        <div class="text-[10px] text-white font-black uppercase tracking-widest mb-2">${w.tagline}</div>
                        <div class="text-[10px] text-neutral-500 uppercase font-bold">${w.status}</div>
                    </div>
                `;
            });
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            if(screenId === 'wrestling-room-screen') renderRoster();
        }

        function toggleOverlay(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        // Logic for Timer and Simulation omitted for brevity but should be retained in your full file
    </script>
</body>
</html>
