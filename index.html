<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force the app to stay inside the screen limits */
        html, body { height: 100vh; margin: 0; padding: 0; overflow: hidden; background-color: #0d0d0d; } 
        body { color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: -0.01em; }
        
        /* HEADER: Locked at 15% of screen */
        header { 
            height: 15vh; 
            min-height: 90px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 2rem;
            background: #000;
            border-bottom: 2px solid #222;
        }

        /* DATA ROW: Locked at 25% of screen */
        .stats-row { height: 25vh; padding: 1rem 2rem; }

        /* ACTION ROW: Locked at 45% of screen to prevent pushing footer */
        .action-row { height: 45vh; padding: 0 2rem 1rem 2rem; }

        /* FOOTER: Locked at 10% of screen */
        footer { height: 10vh; background: #000; border-top: 1px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .title-gradient {
            background: linear-gradient(to right, #ffffff 20%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-large {
            height: 100px; /* Massive Logo Increase */
            width: auto;
            filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.4));
        }

        .mat-card { border: 1px solid #262626; background: rgba(255,255,255,0.02); height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 1.5rem; }
        .action-btn { background: #111; border: 1px solid #333; height: 100%; transition: 0.2s; }
        .action-btn:hover { border-color: #ef4444; background: #1a1a1a; }
    </style>
</head>
<body class="border-t-4 border-red-600">

    <header>
        <div class="flex flex-col">
            <h1 class="text-sm font-black tracking-widest text-red-600 heavyweight-font italic leading-none mb-1">
                MAT LOGIC SYSTEMS
            </h1>
            <h2 class="text-4xl heavyweight-font tracking-tighter title-gradient leading-none">
                WRESTLING INTERACTIVE SIM
            </h2>
        </div>
        
        <div class="flex items-center gap-8">
            <button class="heavyweight-font bg-red-700 text-white px-6 py-3 rounded-full text-xs tracking-widest border border-red-500 shadow-lg">
                MAT LOBBY
            </button>
            <img src="logo.png" alt="Mat Logic Logo" class="logo-large">
        </div>
    </header>

    <div class="stats-row">
        <div class="grid grid-cols-3 gap-6 h-full">
            <div class="mat-card border-l-4 border-l-neutral-700">
                <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Stable Strength</div>
                <div class="text-5xl heavyweight-font text-white leading-none mt-1">0 / 12</div>
            </div>
            <div class="mat-card border-l-4 border-l-red-600">
                <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Season Record</div>
                <div class="text-5xl heavyweight-font text-red-600 italic leading-none mt-1">0 - 0</div>
            </div>
            <div class="mat-card border-l-4 border-l-green-600">
                <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Total Credits</div>
                <div class="text-5xl heavyweight-font text-green-500 leading-none mt-1">$500.00</div>
            </div>
        </div>
    </div>

    <div class="action-row">
        <div class="grid grid-cols-2 gap-6 h-full">
            <button class="action-btn mat-card text-left group">
                <h3 class="text-5xl heavyweight-font mb-2 italic group-hover:text-red-500">RECRUIT</h3>
                <p class="text-neutral-400 text-xs font-bold uppercase tracking-wide">Acquire elite prospects for your roster.</p>
            </button>

            <button class="action-btn mat-card text-left group border-b-2 border-b-red-900">
                <h3 class="text-5xl heavyweight-font mb-2 italic text-red-600 group-hover:text-red-500">THE MAT</h3>
                <p class="text-neutral-300 text-xs font-bold uppercase tracking-wide">Initiate high-stakes simulations.</p>
            </button>
        </div>
    </div>

    <footer>
        <p class="text-[10px] text-neutral-500 uppercase tracking-[0.4em] font-black mb-1">
            © 2026 MAT LOGIC STUDIOS // SYSTEM v2.1
        </p>
        <p class="text-[9px] text-red-900 uppercase font-black tracking-widest">
            AUTHENTICITY: THE ULTIMATE TACTICAL ADVANTAGE
        </p>
    </footer>

</body>
</html>
