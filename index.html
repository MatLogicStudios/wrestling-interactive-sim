<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .mat-border { border: 2px solid #262626; }
        .command-btn { 
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid #333;
            transition: all 0.2s ease;
        }
        .command-btn:hover { border-color: #ef4444; color: #fff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .modal { background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-6 border-b border-neutral-800 flex justify-between items-center bg-black">
        <h1 class="text-xl font-bold tracking-tighter text-white">MAT LOGIC <span class="text-red-600">SYSTEMS</span></h1>
        <div class="text-xs uppercase tracking-widest text-neutral-500">Command Center v1.0</div>
    </header>

    <main class="flex-grow p-4 md:p-10 max-w-6xl mx-auto w-full">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="mat-border p-4 bg-neutral-900/50 rounded-lg">
                <div class="text-xs text-neutral-500 uppercase text-[10px]">Stable Strength</div>
                <div id="stable-count" class="text-2xl font-mono mt-1 text-white">0 / 12</div>
            </div>
            <div class="mat-border p-4 bg-neutral-900/50 rounded-lg">
                <div class="text-xs text-neutral-500 uppercase text-[10px]">Season Record</div>
                <div class="text-2xl font-mono mt-1 text-red-500 italic">ACTIVE</div>
            </div>
            <div class="mat-border p-4 bg-neutral-900/50 rounded-lg">
                <div class="text-xs text-neutral-500 uppercase text-[10px]">Budget</div>
                <div id="budget" class="text-2xl font-mono mt-1 text-green-500">$500.00</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <button onclick="recruitScout()" class="command-btn p-8 rounded-xl text-left group">
                <h2 class="text-2xl font-bold mb-2 uppercase italic tracking-tight">Recruit Athletes</h2>
                <p class="text-neutral-400 text-sm italic">Scan the circuit for new technical prospects.</p>
            </button>

            <button class="command-btn p-8 rounded-xl text-left border-red-900/30 opacity-50 cursor-not-allowed">
                <h2 class="text-2xl font-bold mb-2 uppercase italic tracking-tight text-red-600 underline">Enter The Mat</h2>
                <p class="text-neutral-400 text-sm">Match logic loading...</p>
            </button>
        </div>
    </main>

    <div id="scoutModal" class="hidden fixed inset-0 modal flex items-center justify-center p-4">
        <div class="mat-border bg-neutral-900 p-8 rounded-2xl max-w-md w-full shadow-2xl">
            <h3 class="text-red-600 uppercase tracking-tighter font-bold text-sm mb-4 italic">Scouting Report Found</h3>
            <div id="scoutName" class="text-3xl font-bold text-white mb-6 uppercase">---</div>
            
            <div class="space-y-4 mb-8">
                <div>
                    <div class="flex justify-between text-xs mb-1 uppercase tracking-widest text-neutral-500">Technical Skill <span id="val1">0</span></div>
                    <div class="w-full bg-neutral-800 h-1.5"><div id="bar1" class="bg-blue-500 h-1.5" style="width: 0%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1 uppercase tracking-widest text-neutral-500">Stamina <span id="val2">0</span></div>
                    <div class="w-full bg-neutral-800 h-1.5"><div id="bar2" class="bg-green-500 h-1.5" style="width: 0%"></div></div>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="signWrestler()" class="flex-grow bg-white text-black font-bold py-3 uppercase text-sm hover:bg-red-600 hover:text-white transition">Sign ($100)</button>
                <button onclick="closeModal()" class="flex-grow border border-neutral-700 py-3 uppercase text-sm text-neutral-400 hover:bg-neutral-800">Pass</button>
            </div>
        </div>
    </div>

    <script>
        let stable = 0;
        let budget = 500;

        function recruitScout() {
            const names = ["Cade Miller", "Vance 'The Viper'", "Jaxson Rigg", "Colt 'The Hammer'", "Sterling Sage", "Gunnar Galt"];
            const name = names[Math.floor(Math.random() * names.length)];
            
            const skill = Math.floor(Math.random() * 60) + 40;
            const stamina = Math.floor(Math.random() * 70) + 30;

            document.getElementById('scoutName').innerText = name;
            document.getElementById('val1').innerText = skill;
            document.getElementById('bar1').style.width = skill + "%";
            document.getElementById('val2').innerText = stamina;
            document.getElementById('bar2').style.width = stamina + "%";
            
            document.getElementById('scoutModal').classList.remove('hidden');
        }

        function signWrestler() {
            if (budget >= 100 && stable < 12) {
                stable++;
                budget -= 100;
                document.getElementById('stable-count').innerText = stable + " / 12";
                document.getElementById('budget').innerText = "$" + budget + ".00";
                closeModal();
            } else {
                alert("Insufficient funds or stable full.");
            }
        }

        function closeModal() {
            document.getElementById('scoutModal').classList.add('hidden');
        }
    </script>
</body>
</html>
