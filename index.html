<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Sim V1.1.0 | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-blue: #007bff;
            --accent-red: #dc3545;
            --accent-green: #28a745;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header Fix for Wrestling Room */
        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
            border-bottom: 2px solid #333;
        }

        .logo-placeholder {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: var(--accent-blue);
        }

        /* View Management */
        .view {
            display: none;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .view.active {
            display: block;
        }

        h2 {
            font-family: 'Bebas Neue', cursive;
            font-size: 2rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-blue);
            padding-left: 15px;
        }

        /* Card Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 80px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Blue-Red-Green Sequence */
        .card-blue { border-top: 4px solid var(--accent-blue); }
        .card-red { border-top: 4px solid var(--accent-red); }
        .card-green { border-top: 4px solid var(--accent-green); }

        .progress-container {
            background: #333;
            height: 12px;
            border-radius: 6px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-blue);
            transition: width 0.1s linear;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            background: #333;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Navigation Bar */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: space-around;
            border-top: 2px solid #333;
            padding: 10px 0;
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: 'Bebas Neue', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }

        /* Mat Lobby Specifics */
        .match-card {
            text-align: center;
            border: 2px dashed #444;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-placeholder">MAT LOGIC STUDIOS</div>
</header>

<!-- Wrestling Room View -->
<div id="roomView" class="view active">
    <h2>WRESTLING ROOM</h2>
    <div class="grid">
        <div class="card card-blue">
            <h3>DRILLING</h3>
            <p>Master the fundamentals.</p>
            <div class="progress-container"><div id="drillBar" class="progress-bar"></div></div>
            <button class="btn" onclick="startTraining('drillBar')">Start Session</button>
        </div>
        <div class="card card-red">
            <h3>TECHNIQUE</h3>
            <p>Refine precision moves.</p>
            <div class="progress-container"><div id="techBar" class="progress-bar"></div></div>
            <button class="btn" onclick="startTraining('techBar')">Refine Move</button>
        </div>
        <div class="card card-green">
            <h3>STRENGTH</h3>
            <p>Build raw power.</p>
            <div class="progress-container"><div id="strengthBar" class="progress-bar"></div></div>
            <button class="btn" onclick="startTraining('strengthBar')">Lift Heavy</button>
        </div>
    </div>
</div>

<!-- The Mat Lobby View -->
<div id="matView" class="view">
    <h2>THE MAT LOBBY</h2>
    <div class="grid">
        <div class="card card-blue match-card">
            <h3>LIVE MATCHES</h3>
            <p style="color: var(--text-dim)">No active matches currently.</p>
        </div>
        <div class="card card-red">
            <h3>MATCH MAKER</h3>
            <p>Select your wrestler for the next bout.</p>
            <button class="btn" onclick="alert('Match Engine coming in V1.2.0')">Open Match Maker</button>
        </div>
        <div class="card card-green">
            <h3>SEASON STATS</h3>
            <p>Record: 0 - 0</p>
            <p>Rank: Unranked</p>
        </div>
    </div>
</div>

<nav>
    <button id="navRoom" class="nav-item active" onclick="switchView('roomView', 'navRoom')">RECRUIT</button>
    <button class="nav-item" onclick="switchView('roomView', 'navRoom')">ROOM</button>
    <button id="navMat" class="nav-item" onclick="switchView('matView', 'navMat')">THE MAT</button>
</nav>

<script>
    function startTraining(barId) {
        const bar = document.getElementById(barId);
        const btn = bar.parentElement.nextElementSibling;
        
        btn.disabled = true;
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                btn.disabled = false;
                bar.style.width = '0%';
                alert('Training Complete!');
            } else {
                width++;
                bar.style.width = width + '%';
            }
        }, 30); // ~3 seconds total
    }

    function switchView(viewId, navId) {
        // Hide all views
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        // Deactivate all nav items
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        // Activate selected
        document.getElementById(viewId).classList.add('active');
        document.getElementById(navId).classList.add('active');
    }
</script>

</body>
</html>
