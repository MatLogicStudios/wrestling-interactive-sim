<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force the body to be exactly the size of the screen with no scrolling */
        html, body { height: 100vh; margin: 0; overflow: hidden; background-color: #0d0d0d; } 
        body { color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: -0.01em; }
        
        /* The specific "Dell 3100" Fold Fix */
        header { height: 20vh; min-height: 100px; }
        main { height: 75vh; display: flex; flex-direction: column; gap: 1rem; padding: 1.5rem; }
        footer { height: 5vh; display: flex; align-items: center; justify-content: center; }

        .mat-border { border: 1px solid #262626; background: rgba(255,255,255,0.02); }
        
        .title-gradient {
            background: linear-gradient(to right, #ffffff 20%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .command-btn { 
            background: linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #444;
            transition: all 0.2s ease;
        }
        .command-btn:hover { border-color: #ef4444; background: #1a1a1a; }

        .logo-box {
            height: 120px; /* Force it to be large */
            width: auto;
            border: 1px solid #333;
            background: #000;
            padding: 8px;
            box-shadow: 0 0 20px rgba(239,68,68,0.4);
        }
    </style>
</head>
<body class="border-t-4 border-red-600">

    <header class="px-6 flex justify-between items-center bg-black border-b border-neutral-900">
        <div class="flex flex-col">
            <h1 class="text-xl font-black tracking-widest text-red-600 heavyweight-font italic leading-none mb-1">
                MAT LOGIC SYSTEMS
            </h1>
            <h2 class="text-4xl md:text-6xl heavyweight-font tracking-tighter title-gradient leading-none">
                WRESTLING INTERACTIVE SIM
            </h2>
        </div>
        
        <div class="flex items-center gap-6">
            <button class="heavyweight-font bg-red-700 text-white px-6 py-4 rounded-full text-sm tracking-widest border border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]">
                MAT LOBBY
            </button>
            <img src="logo.png" alt="Mat Logic Shield" class="logo-box rounded-sm">
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full">
        
        <div class="grid grid-cols-3 gap-4 h-1/3">
            <div class="mat-border p-4 rounded-sm border-l-4 border-l-neutral-700 flex flex-col justify-center">
                <div class="text-xs text-neutral-400 uppercase font-black tracking-widest">Stable Strength</div>
                <div class="text-5xl heavyweight-font text-white leading-none mt-1">0 / 12</div>
            </div>
            <div class="mat-border p-4 rounded-sm border-l-4 border-l-red-600 flex flex-col justify-center">
                <div class="text-xs text-neutral-400 uppercase font-black tracking-widest">Season Record</div>
                <div class="text-5xl heavyweight-font text-red-600 italic leading-none mt-1">0 - 0</div>
            </div>
            <div class="mat-border p-4 rounded-sm border-l-4 border-l-green-600 flex flex-col justify-center">
                <div class="text-xs text-neutral-400 uppercase font-black tracking-widest">Total Credits</div>
                <div class="text-5xl heavyweight-font text-green-500 leading-none mt-1">$500.00</div>
            </div>
        </div>

        <div class="flex gap-4 flex-grow h-2/3">
            <button class="command-btn p-8 rounded-sm text-left group border-b-4 border-b-neutral-800 flex-1 flex flex-col justify-center">
                <h3 class="text-5xl heavyweight-font mb-2 italic group-hover:text-red-500">RECRUIT</h3>
                <p class="text-neutral-300 text-sm font-bold uppercase tracking-wide">
                    Acquire elite prospects for your roster.
                </p>
            </button>

            <button class="command-btn p-8 rounded-sm text-left group border-b-4 border-b-red-900 flex-1 flex flex-col justify-center">
                <h3 class="text-5xl heavyweight-font mb-2 italic text-red-600 group-hover:text-red-500">THE MAT</h3>
                <p class="text-neutral-300 text-sm font-bold uppercase tracking-wide">
                    Initiate high-stakes simulations.
                </p>
            </button>
        </div>
    </main>

    <footer class="bg-black border-t border-neutral-900">
        <p class="text-[10px] text-neutral-500 uppercase tracking-[0.4em] font-black">
            © 2026 MAT LOGIC STUDIOS // SYSTEM v2.1
        </p>
    </footer>

</body>
</html>
