<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .mat-border { border: 2px solid #262626; }
        .command-btn { 
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid #333;
            transition: all 0.2s ease;
        }
        .command-btn:hover { border-color: #ef4444; color: #fff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-6 border-b border-neutral-800 flex justify-between items-center bg-black">
        <h1 class="text-xl font-bold tracking-tighter text-white">MAT LOGIC <span class="text-red-600">SYSTEMS</span></h1>
        <div class="text-xs uppercase tracking-widest text-neutral-500">Command Center v1.0</div>
    </header>

    <main class="flex-grow p-4 md:p-10 max-w-6xl mx-auto w-full">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="mat-border p-4 bg-neutral-900/50 rounded-lg">
                <div class="text-xs text-neutral-500 uppercase">Stable Strength</div>
                <div class="text-2xl font-mono mt-1">0 / 12</div>
            </div>
            <div class="mat-border p-4 bg-neutral-900/50 rounded-lg">
                <div class="text-xs text-neutral-500 uppercase">Season Record</div>
                <div class="text-2xl font-mono mt-1 text-red-500">0 - 0</div>
            </div>
            <div class="mat-border p-4 bg-neutral-900/50 rounded-lg">
                <div class="text-xs text-neutral-500 uppercase">Credits</div>
                <div class="text-2xl font-mono mt-1">$500.00</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <button class="command-btn p-8 rounded-xl text-left group">
                <h2 class="text-2xl font-bold mb-2 uppercase italic tracking-tight">Recruit Athletes</h2>
                <p class="text-neutral-400 text-sm">Scan the circuit for new technical prospects.</p>
            </button>

            <button class="command-btn p-8 rounded-xl text-left border-red-900/30">
                <h2 class="text-2xl font-bold mb-2 uppercase italic tracking-tight text-red-600">Enter The Mat</h2>
                <p class="text-neutral-400 text-sm">Launch active interactive match simulation.</p>
            </button>
        </div>

    </main>

    <footer class="p-6 border-t border-neutral-800 text-center text-xs text-neutral-600 uppercase tracking-widest">
        &copy; 2026 Mat Logic Studios | The Mat is Yours. Take Control.
    </footer>

</body>
</html>
