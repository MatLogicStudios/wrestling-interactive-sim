<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Strict screen-fit protocol for Dell 3100 */
        html, body { height: 100vh; margin: 0; padding: 0; overflow: hidden; background-color: #0d0d0d; } 
        body { color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: -0.01em; }
        
        /* HEADER: Scaled up for better presence */
        header { 
            height: 18vh; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 3rem;
            background: #000;
            border-bottom: 2px solid #1a1a1a;
        }

        /* DATA ROW: Compact at 20% */
        .stats-row { height: 20vh; padding: 1rem 2rem; }

        /* ACTION ROW: Sized specifically to match the top row's feel */
        .action-row { height: 42vh; padding: 0 2rem; }

        /* FOOTER: Combined branding/legal to save vertical space */
        footer { 
            height: 20vh; 
            background: #000; 
            border-top: 1px solid #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 4px;
        }

        .title-gradient {
            background: linear-gradient(to right, #ffffff 20%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Isolated Logo container for max right-side clearance */
        .logo-block {
            padding-right: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .logo-display {
            height: 95px;
            width: auto;
            border: 1px solid #333;
            background: #050505;
        }

        .mat-card { 
            border: 1px solid #262626; 
            background: rgba(255,255,255,0.02); 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 1.5rem; 
        }

        .action-btn { 
            background: #111; 
            border: 1px solid #333; 
            transition: 0.2s;
        }
        .action-btn:hover { border-color: #ef4444; background: #151515; }
    </style>
</head>
<body class="border-t-4 border-red-600">

    <header>
        <div class="flex flex-col">
            <h1 class="text-sm font-black tracking-[0.4em] text-red-600 heavyweight-font italic leading-none mb-2">
                MAT LOGIC SYSTEMS
            </h1>
            <h2 class="text-5xl md:text-6xl heavyweight-font tracking-tighter title-gradient leading-none">
                WRESTLING INTERACTIVE SIM
            </h2>
        </div>
        
        <div class="logo-block">
            <button class="heavyweight-font bg-red-700 text-white px-6 py-3 rounded-full text-xs tracking-widest border border-red-500 shadow-lg hover:bg-red-600 transition-all">
                MAT LOBBY
            </button>
            <img src="logo.png" alt="Mat Logic Logo" class="logo-display">
        </div>
    </header>

    <div class="stats-row">
        <div class="grid grid-cols-3 gap-6 h-full">
            <div class="mat-card border-l-4 border-l-neutral-700">
                <div class="text-[10px] text-neutral-500 uppercase font-black tracking-widest">Stable Strength</div>
                <div class="text-4xl heavyweight-font text-white mt-1">0 / 12</div>
            </div>
            <div class="mat-card border-l-4 border-l-red-600">
                <div class="text-[10px] text-neutral-500 uppercase font-black tracking-widest">Season Record</div>
                <div class="text-4xl heavyweight-font text-red-600 italic mt-1">0 - 0</div>
            </div>
            <div class="mat-card border-l-4 border-l-green-600">
                <div class="text-[10px] text-neutral-500 uppercase font-black tracking-widest">Total Credits</div>
                <div class="text-4xl heavyweight-font text-green-500 mt-1">$500.00</div>
            </div>
        </div>
    </div>

    <div class="action-row">
        <div class="grid grid-cols-2 gap-6 h-full">
            <button class="action-btn mat-card text-left group">
                <h3 class="text-4xl heavyweight-font italic group-hover:text-red-500">RECRUIT</h3>
                <p class="text-neutral-500 text-[11px] font-bold uppercase tracking-wide">Enter the technical circuit.</p>
            </button>

            <button class="action-btn mat-card text-left group border-b-2 border-b-red-900">
                <h3 class="text-4xl heavyweight-font italic text-red-600 group-hover:text-red-500">THE MAT</h3>
                <p class="text-neutral-500 text-[11px] font-bold uppercase tracking-wide">Start high-stakes simulation.</p>
            </button>
        </div>
    </div>

    <footer>
        <div class="flex items-baseline gap-4">
            <span class="text-xs font-black text-white tracking-[0.2em] heavyweight-font italic">MAT LOGIC SYSTEMS</span>
            <span class="h-[1px] w-12 bg-red-900"></span>
            <span class="text-[10px] text-neutral-500 uppercase tracking-[0.4em] font-bold">© 2026 MAT LOGIC STUDIOS // SYSTEM v2.1</span>
        </div>
        <p class="text-[9px] text-red-900 uppercase font-black tracking-[0.3em] mt-2">
            AUTHENTICITY: THE ULTIMATE TACTICAL ADVANTAGE
        </p>
    </footer>

</body>
</html>
