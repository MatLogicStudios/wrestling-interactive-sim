<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force zero scroll and eliminate any extra padding from the browser */
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #0d0d0d; } 
        body { color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: -0.01em; }
        
        /* Tactical Layout Containers */
        header { flex: 0 0 auto; padding: 0.75rem 1.5rem; background: #000; border-bottom: 1px solid #222; }
        main { flex: 1 1 auto; display: flex; flex-direction: column; padding: 1rem; gap: 0.75rem; overflow: hidden; }
        footer { flex: 0 0 auto; padding: 0.5rem; background: #000; border-top: 1px solid #222; }

        .mat-border { border: 1px solid #262626; background: rgba(255,255,255,0.02); }
        
        .title-gradient {
            background: linear-gradient(to right, #ffffff 20%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Large Brand Anchor */
        .logo-main {
            height: 90px;
            width: auto;
            border: 1px solid #444;
            background: #111;
            padding: 5px;
            box-shadow: 0 0 20px rgba(239,68,68,0.25);
        }

        .command-btn { 
            background: linear-gradient(180deg, rgba(30,30,30,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #333;
            height: 100%;
        }
        .command-btn:hover { border-color: #ef4444; }
    </style>
</head>
<body class="border-t-2 border-red-600">

    <header class="flex justify-between items-center">
        <div class="flex flex-col">
            <h1 class="text-xs font-black tracking-[0.2em] text-red-600 heavyweight-font italic leading-none mb-1">
                MAT LOGIC SYSTEMS
            </h1>
            <h2 class="text-3xl md:text-5xl heavyweight-font tracking-tighter title-gradient leading-tight">
                WRESTLING INTERACTIVE SIM
            </h2>
        </div>
        
        <div class="flex items-center gap-6">
            <button class="heavyweight-font bg-red-700 text-white px-5 py-3 rounded-full text-xs tracking-widest border border-red-500 shadow-lg">
                MAT LOBBY
            </button>
            <img src="logo.png" alt="Mat Logic Shield" class="logo-main rounded-sm">
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full">
        
        <div class="grid grid-cols-3 gap-3" style="height: 25%;">
            <div class="mat-border p-3 rounded-sm border-l-4 border-l-neutral-700 flex flex-col justify-center">
                <div class="text-[10px] text-neutral-500 uppercase font-black tracking-widest">Stable Strength</div>
                <div class="text-4xl heavyweight-font text-white leading-none mt-1">0 / 12</div>
            </div>
            <div class="mat-border p-3 rounded-sm border-l-4 border-l-red-600 flex flex-col justify-center">
                <div class="text-[10px] text-neutral-500 uppercase font-black tracking-widest">Season Record</div>
                <div class="text-4xl heavyweight-font text-red-600 italic leading-none mt-1">0 - 0</div>
            </div>
            <div class="mat-border p-3 rounded-sm border-l-4 border-l-green-600 flex flex-col justify-center">
                <div class="text-[10px] text-neutral-500 uppercase font-black tracking-widest">Total Credits</div>
                <div class="text-4xl heavyweight-font text-green-500 leading-none mt-1">$500.00</div>
            </div>
        </div>

        <div class="flex gap-3" style="height: 75%;">
            <button class="command-btn p-6 rounded-sm text-left group border-b-4 border-b-neutral-800 flex-1 flex flex-col justify-center">
                <h3 class="text-4xl heavyweight-font mb-1 italic group-hover:text-red-500 transition-colors">RECRUIT</h3>
                <p class="text-neutral-400 text-xs font-bold uppercase tracking-wide leading-tight">
                    Acquire elite prospects for your roster.
                </p>
            </button>

            <button class="command-btn p-6 rounded-sm text-left group border-b-4 border-b-red-900 flex-1 flex flex-col justify-center">
                <h3 class="text-4xl heavyweight-font mb-1 italic text-red-600 group-hover:text-red-500 transition-colors">THE MAT</h3>
                <p class="text-neutral-400 text-xs font-bold uppercase tracking-wide leading-tight">
                    Initiate high-stakes simulations.
                </p>
            </button>
        </div>
    </main>

    <footer class="text-center">
        <p class="text-[9px] text-neutral-600 uppercase tracking-[0.4em] font-black leading-none">
            © 2026 MAT LOGIC STUDIOS // SYSTEM v2.1
        </p>
    </footer>

</body>
</html>
