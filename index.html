<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100vh; margin: 0; overflow: hidden; } 
        body { background-color: #0d0d0d; color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }
        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .mat-border { border: 1px solid #262626; background: rgba(255,255,255,0.02); backdrop-filter: blur(2px); border-radius: 15px; }
        .title-gradient { background: linear-gradient(to right, #ffffff 20%, #ef4444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        button, .command-btn, .mat-border { border-radius: 15px !important; }

        .command-btn { 
            background: linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; justify-content: center;
            height: 110px;
        }
        .command-btn:hover { border-color: #ef4444; transform: translateY(-2px); }
        
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }

        .danger-btn-large {
            background-color: #dc2626 !important;
            color: white !important;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: 0.2s;
            border-radius: 15px !important;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active-screen { display: flex; }

        .log-red { color: #ef4444; }
        .log-blue { color: #3b82f6; }

        /* Centered Footer Logic */
        .footer-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .footer-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
    </style>
</head>
<body class="border-t-4 border-red-600">

    <div id="main-dashboard" class="screen active-screen">
        <header class="flex-none p-4 md:p-6 border-b border-neutral-900 flex justify-between items-center bg-black relative">
            <div class="flex flex-col justify-center">
                <h1 class="text-xl md:text-2xl font-black tracking-tighter text-white heavyweight-font italic leading-tight">
                    MAT LOGIC <span class="text-red-600">STUDIOS</span>
                </h1>
                <h2 class="text-3xl md:text-5xl lg:text-6xl heavyweight-font tracking-tighter title-gradient leading-none">
                    WRESTLING INTERACTIVE SIM
                </h2>
            </div>
            <div class="flex items-center">
                <button onclick="showScreen('mat-lobby-screen')" class="heavyweight-font bg-red-700 hover:bg-red-600 text-white px-8 py-4 rounded-full text-xs tracking-[0.2em] transition border border-red-500 shadow-lg mr-4 md:mr-10">
                    MAT LOBBY
                </button>
                <div class="flex-none" style="min-width: 150px;"> 
                    <img src="logo.png" alt="Mat Logic Studios" class="h-24 md:h-32 w-auto object-contain">
                </div>
            </div>
        </header>

        <main class="flex-grow flex flex-col justify-center p-4 md:p-6 max-w-7xl mx-auto w-full">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-neutral-600">
                    <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Stable Strength</div>
                    <div id="stable-count" class="text-3xl md:text-4xl heavyweight-font mt-1">3 / 12</div>
                </div>
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-red-600">
                    <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Season Record</div>
                    <div class="text-3xl md:text-4xl heavyweight-font mt-1 text-red-600 italic">0 - 0</div>
                </div>
                <div class="mat-border p-4 md:p-6 border-l-4 border-l-green-600">
                    <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Total Credits</div>
                    <div id="credit-display" class="text-3xl md:text-4xl heavyweight-font mt-1 text-green-500">$500.00</div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="toggleOverlay('recruit-modal')" class="command-btn p-6 text-left group border-b-4 border-b-neutral-800">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic group-hover:text-white">RECRUIT</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Find Prospects</p>
                </button>
                <button onclick="showScreen('wrestling-room-screen')" class="command-btn p-6 text-left group border-b-4 border-b-red-600">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic text-red-600 group-hover:text-red-500">WRESTLING ROOM</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Train & Level Up</p>
                </button>
                <button onclick="startSim()" class="command-btn p-6 text-left group border-b-4 border-b-red-900">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic text-red-600 group-hover:text-red-500">THE MAT</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Simulations</p>
                </button>
                <button class="command-btn p-6 text-left group border-b-4 border-b-green-900">
                    <h3 class="text-lg md:text-xl heavyweight-font mb-1 italic text-green-600 group-hover:text-green-500">THE SHOP</h3>
                    <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">Gear & Credits</p>
                </button>
            </div>
        </main>

        <footer class="flex-none p-6 border-t border-neutral-900 bg-black footer-container">
            <div class="text-left">
                <div class="text-xs font-black tracking-widest text-white heavyweight-font italic">
                    MAT LOGIC <span class="text-red-600">STUDIOS</span> <span class="text-neutral-600 ml-2">v1.0.4</span>
                </div>
                <div class="text-[9px] text-neutral-500 uppercase tracking-widest mt-1">© 2026 ALL RIGHTS RESERVED</div>
            </div>
            
            <div class="footer-center">
                <div class="text-[10px] text-red-600 heavyweight-font italic tracking-[0.3em] uppercase leading-tight">
                    AUTHENTICITY VERIFIED<br>
                    TACTICAL ADVANTAGE ACTIVE
                </div>
            </div>
            
            <div class="w-32"></div> 
        </footer>
    </div>

    <!-- SIMULATION OVERLAY -->
    <div id="the-mat-sim" class="modal-overlay">
        <div class="min-h-screen w-full bg-[#050505] p-6 flex flex-col relative">
            <button onclick="stopSim()" class="danger-btn-large absolute top-6 right-6 px-10 py-4 text-xs z-50">END MATCH</button>
            
            <div class="grid grid-cols-3 gap-4 mb-6 border-b-2 border-red-900 pb-4 pr-32">
                <div class="text-center">
                    <div class="text-[10px] text-neutral-500 uppercase font-black tracking-widest">RED WRESTLER</div>
                    <div id="red-score" class="text-5xl md:text-7xl heavyweight-font text-red-600">00</div>
                </div>
                <div class="text-center flex flex-col justify-center">
                    <div id="match-timer" class="text-4xl md:text-6xl heavyweight-font text-white italic">3:00</div>
                    <div id="riding-time" class="text-xs md:text-sm text-yellow-500 font-mono mt-2 uppercase tracking-[0.2em]">RT: 0:00</div>
                </div>
                <div class="text-center">
                    <div class="text-[10px] text-neutral-500 uppercase font-black tracking-widest">BLUE WRESTLER</div>
                    <div id="blue-score" class="text-5xl md:text-7xl heavyweight-font text-blue-600">00</div>
                </div>
            </div>

            <div class="flex-grow mat-border relative overflow-hidden bg-black flex flex-col items-center justify-center">
                <div id="sim-log" class="absolute top-4 left-4 z-10 text-[11px] font-mono uppercase bg-black/80 p-4 border border-neutral-800 w-64 h-32 overflow-hidden flex flex-col justify-end">
                    <div class="text-neutral-500">[SYSTEM]: READY...</div>
                </div>
                <div id="action-clock" class="absolute bottom-8 right-8 text-7xl heavyweight-font text-red-600 italic">15</div>
                <div id="position-badge" class="heavyweight-font text-2xl text-neutral-600 italic tracking-widest">NEUTRAL</div>
                <button onclick="testBlueMove()" class="absolute bottom-4 left-4 text-[8px] bg-blue-900/20 text-blue-500 p-1 border border-blue-900/50">TEST BLUE ACTION</button>
            </div>

            <div id="action-commands" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6"></div>
        </div>
    </div>

    <script>
        const decks = {
            neutral: [
                { name: "Power Takedown", nextPos: "folkstyle_top", points: 2, sub: "High C" },
                { name: "Single Leg", nextPos: "folkstyle_top", points: 2, sub: "Attack" },
                { name: "Snap Down", nextPos: "neutral", points: 0, sub: "Handfighting" },
                { name: "Ankle Pick", nextPos: "folkstyle_top", points: 2, sub: "Attack" },
                { name: "Low Single", nextPos: "folkstyle_top", points: 2, sub: "Attack" },
                { name: "Arm Drag", nextPos: "folkstyle_top", points: 2, sub: "Attack" }
            ],
            folkstyle_top: [
                { name: "Waist Lock", nextPos: "folkstyle_top", points: 0, sub: "Control" },
                { name: "Forward Trip", nextPos: "folkstyle_top", points: 0, sub: "Breakdown" },
                { name: "Arm Chop", nextPos: "folkstyle_top", points: 0, sub: "Breakdown" },
                { name: "Spiral Ride", nextPos: "folkstyle_top", points: 0, sub: "Pressure" },
                { name: "Crossface", nextPos: "folkstyle_top", points: 0, sub: "Control" },
                { name: "Half Nelson", nextPos: "folkstyle_top", points: 0, sub: "Turn Attempt" }
            ]
        };

        let currentPosition = 'neutral';
        let redScore = 0;
        let actionSeconds = 15;
        let actionInterval;

        function updateLog(message, colorClass = '') {
            const log = document.getElementById('sim-log');
            const entry = document.createElement('div');
            entry.className = colorClass;
            entry.innerText = `> ${message}`;
            log.appendChild(entry);
            if(log.childNodes.length > 6) log.removeChild(log.firstChild);
        }

        function handleMove(move, isRed = true) {
            const colorClass = isRed ? 'log-red' : 'log-blue';
            updateLog(`${isRed ? 'RED' : 'BLUE'} ATTEMPTS ${move.name.toUpperCase()}`, colorClass);
            
            currentPosition = move.nextPos;
            if(isRed) {
                redScore += move.points;
                document.getElementById('red-score').innerText = redScore.toString().padStart(2, '0');
            }
            
            document.getElementById('position-badge').innerText = currentPosition.replace('_', ' ').toUpperCase();
            renderCommands();
            startActionClock();
        }

        function testBlueMove() {
            handleMove({ name: "Counter Shot", nextPos: "neutral", points: 0 }, false);
        }

        function renderCommands() {
            const container = document.getElementById('action-commands');
            container.innerHTML = '';
            const currentDeck = decks[currentPosition] || decks['neutral'];
            currentDeck.forEach(move => {
                const btn = document.createElement('button');
                btn.className = "command-btn p-4 border-b-4 border-b-red-600";
                btn.innerHTML = `<h3 class="text-base heavyweight-font italic">${move.name}</h3><p class="text-[8px] text-neutral-500 font-bold uppercase tracking-widest">${move.sub}</p>`;
                btn.onclick = () => handleMove(move);
                container.appendChild(btn);
            });
        }

        function startSim() {
            document.getElementById('the-mat-sim').style.display = 'flex';
            currentPosition = 'neutral';
            redScore = 0;
            updateLog("MATCH STARTED");
            renderCommands();
            startActionClock();
        }

        function stopSim() {
            document.getElementById('the-mat-sim').style.display = 'none';
            clearInterval(actionInterval);
        }

        function startActionClock() {
            clearInterval(actionInterval);
            actionSeconds = 15;
            document.getElementById('action-clock').innerText = actionSeconds;
            actionInterval = setInterval(() => {
                actionSeconds--;
                document.getElementById('action-clock').innerText = actionSeconds;
                if(actionSeconds <= 0) clearInterval(actionInterval);
            }, 1000);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function toggleOverlay(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }
    </script>
</body>
</html>
