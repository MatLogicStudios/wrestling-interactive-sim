<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; } 
        body { background-color: #0d0d0d; color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: -0.01em; }
        .mat-border { border: 1px solid #262626; background: rgba(255,255,255,0.02); backdrop-filter: blur(2px); }
        
        .title-gradient {
            background: linear-gradient(to right, #ffffff 20%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-frame {
            border: 1px solid #333;
            background: #000;
            padding: 4px;
            box-shadow: 0 0 15px rgba(239,68,68,0.3);
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(185, 28, 28, 0); }
            100% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0); }
        }
        .lobby-pulse { animation: pulse-red 2s infinite; }

        .command-btn { 
            background: linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #444;
            transition: all 0.2s ease-in-out;
        }
        .command-btn:hover { border-color: #ef4444; background: #1a1a1a; }
    </style>
</head>
<body class="border-t-4 border-red-600">

    <header class="p-6 border-b border-neutral-900 flex justify-between items-center bg-black">
        <div class="flex flex-col">
            <h1 class="text-xl font-black tracking-widest text-red-600 heavyweight-font italic leading-none mb-1">
                MAT LOGIC SYSTEMS
            </h1>
            <h2 class="text-4xl md:text-5xl heavyweight-font tracking-tighter title-gradient leading-none">
                WRESTLING INTERACTIVE SIM
            </h2>
        </div>
        
        <div class="flex items-center gap-6">
            <button onclick="toggleLobby()" class="heavyweight-font bg-red-700 text-white px-8 py-4 rounded-full text-sm tracking-widest transition lobby-pulse border border-red-500">
                MAT LOBBY
            </button>
            <div class="logo-frame rounded-sm">
                <img src="logo.png" alt="Mat Logic Shield" class="h-20 w-auto block">
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col justify-center p-6 max-w-7xl mx-auto w-full gap-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="mat-border p-6 rounded-sm border-l-4 border-l-neutral-700">
                <div class="text-sm text-neutral-400 uppercase font-black tracking-widest">Stable Strength</div>
                <div class="text-6xl heavyweight-font mt-1 text-white">0 / 12</div>
            </div>
            <div class="mat-border p-6 rounded-sm border-l-4 border-l-red-600">
                <div class="text-sm text-neutral-400 uppercase font-black tracking-widest">Season Record</div>
                <div class="text-6xl heavyweight-font mt-1 text-red-600 italic">0 - 0</div>
            </div>
            <div class="mat-border p-6 rounded-sm border-l-4 border-l-green-600">
                <div class="text-sm text-neutral-400 uppercase font-black tracking-widest">Total Credits</div>
                <div class="text-6xl heavyweight-font mt-1 text-green-500">$500.00</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button class="command-btn p-12 rounded-sm text-left group border-b-4 border-b-neutral-800">
                <h3 class="text-5xl heavyweight-font mb-2 italic group-hover:text-red-500 transition-colors">RECRUIT</h3>
                <p class="text-neutral-300 text-base font-bold uppercase tracking-wide leading-tight">
                    Acquire elite prospects for your roster.
                </p>
            </button>

            <button class="command-btn p-12 rounded-sm text-left group border-b-4 border-b-red-900">
                <h3 class="text-5xl heavyweight-font mb-2 italic text-red-600 group-hover:text-red-500 transition-colors">THE MAT</h3>
                <p class="text-neutral-300 text-base font-bold uppercase tracking-wide leading-tight">
                    Initiate high-stakes simulations.
                </p>
            </button>
        </div>
    </main>

    <footer class="p-4 border-t border-neutral-900 text-center bg-black">
        <p class="text-xs text-neutral-500 uppercase tracking-[0.4em] font-black">
            © 2026 MAT LOGIC STUDIOS // SYSTEM v2.1
        </p>
    </footer>

    <script>
        function toggleLobby() {
            console.log('Lobby Toggle');
        }
    </script>
</body>
</html>
