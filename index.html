<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Interactive Sim | Mat Logic Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; } 
        body { background-color: #0d0d0d; color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .heavyweight-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: -0.01em; }
        .mat-border { border: 1px solid #262626; background: rgba(255,255,255,0.02); backdrop-filter: blur(2px); }
        
        .title-gradient {
            background: linear-gradient(to right, #ffffff 20%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Tactical Logo Frame */
        .logo-frame {
            border: 1px solid #333;
            background: #000;
            padding: 4px;
            box-shadow: 0 0 15px rgba(239,68,68,0.2);
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(185, 28, 28, 0); }
            100% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0); }
        }
        .lobby-pulse { animation: pulse-red 2s infinite; }

        .command-btn { 
            background: linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .command-btn:hover { border-color: #ef4444; transform: translateY(-2px); }
    </style>
</head>
<body class="border-t-2 border-red-600">

    <header class="p-4 border-b border-neutral-900 flex justify-between items-center bg-black">
        <div class="flex items-center gap-4">
            <div class="logo-frame rounded-sm">
                <img src="logo.png" alt="Mat Logic Shield" class="h-16 w-auto block">
            </div>
            
            <div>
                <h1 class="text-lg font-black tracking-tighter text-white heavyweight-font italic leading-none">
                    MAT LOGIC <span class="text-red-600">SYSTEMS</span>
                </h1>
                <h2 class="text-2xl md:text-3xl heavyweight-font tracking-tighter title-gradient leading-none mt-1">
                    WRESTLING INTERACTIVE SIM
                </h2>
            </div>
        </div>
        
        <button onclick="toggleLobby()" class="heavyweight-font bg-red-700 hover:bg-red-600 text-white px-6 py-3 rounded-full text-[10px] tracking-[0.2em] transition lobby-pulse border border-red-500 shadow-lg">
            MAT LOBBY
        </button>
    </header>

    <main class="flex-grow flex flex-col justify-center p-4 max-w-6xl mx-auto w-full">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
            <div class="mat-border p-4 rounded-sm border-l-2 border-l-neutral-600">
                <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Stable Strength</div>
                <div class="text-2xl heavyweight-font mt-1">0 / 12</div>
            </div>
            <div class="mat-border p-4 rounded-sm border-l-2 border-l-red-600">
                <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Season Record</div>
                <div class="text-2xl heavyweight-font mt-1 text-red-600 italic">0 - 0</div>
            </div>
            <div class="mat-border p-4 rounded-sm border-l-2 border-l-green-600">
                <div class="text-[10px] text-neutral-400 uppercase font-black tracking-widest">Total Credits</div>
                <div class="text-2xl heavyweight-font mt-1 text-green-500">$500.00</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <button class="command-btn p-6 rounded-sm text-left group border-b-2 border-b-neutral-800">
                <h3 class="text-2xl heavyweight-font mb-1 italic group-hover:text-white">RECRUIT</h3>
                <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">
                    Scan the technical circuit to acquire elite prospects.
                </p>
            </button>

            <button class="command-btn p-6 rounded-sm text-left group border-b-2 border-b-red-900">
                <h3 class="text-2xl heavyweight-font mb-1 italic text-red-600 group-hover:text-red-500">THE MAT</h3>
                <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest leading-tight">
                    Initiate match simulations and test logic.
                </p>
            </button>
        </div>
    </main>

    <footer class="p-4 border-t border-neutral-900 text-center bg-black">
        <p class="text-[9px] text-neutral-500 uppercase tracking-[0.4em] font-black">
            © 2026 MAT LOGIC STUDIOS // SYSTEM v2.1
        </p>
    </footer>

    <script>
        function toggleLobby() {
            /* Placeholder for lobby logic */
            alert('Opening Mat Lobby...');
        }
    </script>
</body>
</html>
